name: DAO Box CI

on:
  push:
    branches: ["main", "oktonystark8/dao-34-setup-cicd-pipeline"]
  pull_request:
    branches: ["main", "oktonystark8/dao-34-setup-cicd-pipeline"]

jobs:
  lint:
    strategy:
      matrix:
        os: [ubuntu-latest]
        node-version: [16.x]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ./packages/daobox-use-aragon
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: "./yarn.lock"
      - run: npm install --global yarn
      - run: yarn install
      - run: yarn lint:check
      build:
    strategy:
      matrix:
        os: [ubuntu-latest]
        node-version: [16.x]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ./packages/daobox-use-aragon
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: "./yarn.lock"
      - run: npm install --global yarn
      - run: yarn install
      - run: yarn build