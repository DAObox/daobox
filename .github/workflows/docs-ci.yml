name: UseAragon Docs CI

on:
  push:
    branches: ["main", "oktonystark8/dao-34-setup-cicd-pipeline"]
  pull_request:
    branches: ["main", "oktonystark8/dao-34-setup-cicd-pipeline"]

jobs:
  lint:
    strategy:
      matrix:
        os: [ubuntu-latest]
        node-version: [16.x]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ./apps/docs
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
          cache-dependency-path: "./pnpm-lock.yml"
      - run: npm install --global pnpm
      - run: pnpm install
      - run: pnpm run lint
  build:
    strategy:
      matrix:
        os: [ubuntu-latest]
        node-version: [16.x]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ./apps/docs
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
          cache-dependency-path: "./apps/docs/pnpm-lock.yaml"
      - run: npm install --global pnpm
      - run: pnpm install
      - run: pnpm run build
